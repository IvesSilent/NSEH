<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSEH - 登录</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='NSEH_login.css') }}">
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h1>NSEH</h1>
            <p>启发式组合优化进化框架</p>
        </div>

        <div class="login-form">
            <div class="form-group">
                <label for="userId">用户ID</label>
                <input type="text" id="userId" placeholder="输入用户ID" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="输入密码" autocomplete="current-password">
                    <button class="password-toggle" type="button" aria-label="显示密码" data-target="password" tabindex="-1">
                        <svg class="eye-icon eye-open" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="20" height="20">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                        <svg class="eye-icon eye-slash" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="20" height="20" style="display:none;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div id="error-message" class="error-message"></div>
            <button id="login-btn" class="login-btn">登 录</button>
            <div class="login-footer">
                <span>还没有账号？</span>
                <a href="#" id="register-link">立即注册</a>
            </div>
        </div>

        <div class="register-form" style="display:none;">
            <div class="form-group">
                <label for="regUserId">用户ID</label>
                <input type="text" id="regUserId" placeholder="设置用户ID">
            </div>
            <div class="form-group">
                <label for="regPassword">密码</label>
                <div class="password-wrapper">
                    <input type="password" id="regPassword" placeholder="设置密码">
                    <button class="password-toggle" type="button" aria-label="显示密码" data-target="regPassword" tabindex="-1">
                        <svg class="eye-icon eye-open" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="20" height="20">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                        <svg class="eye-icon eye-slash" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="20" height="20" style="display:none;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label for="regUserName">昵称（可选）</label>
                <input type="text" id="regUserName" placeholder="输入昵称">
            </div>
            <div id="register-error" class="error-message"></div>
            <button id="register-btn" class="login-btn register-btn">注 册</button>
            <div class="login-footer">
                <span>已有账号？</span>
                <a href="#" id="login-link">立即登录</a>
            </div>
        </div>
    </div>
</div>
<script src="{{ url_for('static', filename='NSEH_login.js') }}"></script>
</body>
</html>
