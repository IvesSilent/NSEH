<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSEH - 登录</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='NSEH_login.css') }}">
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h1>NSEH</h1>
            <p>启发式组合优化进化框架</p>
        </div>

        <div class="login-form">
            <div class="form-group">
                <label for="userId">用户ID</label>
                <input type="text" id="userId" placeholder="输入用户ID" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="输入密码" autocomplete="current-password">
            </div>
            <div id="error-message" class="error-message"></div>
            <button id="login-btn" class="login-btn">登 录</button>
            <div class="login-footer">
                <span>还没有账号？</span>
                <a href="#" id="register-link">立即注册</a>
            </div>
        </div>

        <div class="register-form" style="display:none;">
            <div class="form-group">
                <label for="regUserId">用户ID</label>
                <input type="text" id="regUserId" placeholder="设置用户ID">
            </div>
            <div class="form-group">
                <label for="regPassword">密码</label>
                <input type="password" id="regPassword" placeholder="设置密码">
            </div>
            <div class="form-group">
                <label for="regUserName">昵称（可选）</label>
                <input type="text" id="regUserName" placeholder="输入昵称">
            </div>
            <div id="register-error" class="error-message"></div>
            <button id="register-btn" class="login-btn register-btn">注 册</button>
            <div class="login-footer">
                <span>已有账号？</span>
                <a href="#" id="login-link">立即登录</a>
            </div>
        </div>
    </div>
</div>
<script src="{{ url_for('static', filename='NSEH_login.js') }}"></script>
</body>
</html>
